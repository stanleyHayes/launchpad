name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Lint
        run: golangci-lint run ./...
      - name: Test
        run: go test ./... -coverprofile=coverage.out -covermode=atomic
        env:
          JWT_SECRET: ci-test-secret
          MONGODB_URI: mongodb://localhost:27017/launchpad
          MONGODB_DATABASE: launchpad
          REDIS_URL: redis://localhost:6379/0
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @launchpad/platform-admin-web build
      - run: pnpm --filter @launchpad/organization-admin-web build
      - run: pnpm --filter @launchpad/employee-web build
      - run: pnpm --filter @launchpad/marketing-web build
