services:
  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_DATABASE: launchpad
      MONGO_INITDB_ROOT_USERNAME: launchpad
      MONGO_INITDB_ROOT_PASSWORD: launchpad
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 20s
      retries: 12
      start_period: 40s

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      MONGODB_URI: mongodb://launchpad:launchpad@mongo:27017/launchpad?authSource=admin
      MONGODB_DATABASE: launchpad
      REDIS_URL: redis://redis:6379/0
      HTTP_ADDR: :8080
      JWT_SECRET: local-dev-only-change-me
      APP_ENV: local
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003
    ports:
      - "8080:8080"
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
